name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            args: ""
          - os: macos-latest
            label: macOS-ARM
            args: "--target aarch64-apple-darwin"
          - os: macos-latest
            label: macOS-Intel
            args: "--target x86_64-apple-darwin"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm install

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MINT Grader ${{ github.ref_name }}"
          releaseBody: "Installers for Windows and macOS (ARM + Intel)"
          releaseDraft: true
          args: ${{ matrix.args }}
